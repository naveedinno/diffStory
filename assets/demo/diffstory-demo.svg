<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">diffStory guided review demo</title>
  <desc id="desc">A stylized screenshot of diffStory showing a guided review story, split diff, and selected-text comments.</desc>
  <rect width="1280" height="760" fill="#f5f7fb"/>
  <rect x="36" y="34" width="1208" height="692" rx="18" fill="#18202c"/>
  <rect x="36" y="34" width="1208" height="56" rx="18" fill="#222c3b"/>
  <circle cx="68" cy="62" r="7" fill="#ff6b6b"/>
  <circle cx="92" cy="62" r="7" fill="#ffd166"/>
  <circle cx="116" cy="62" r="7" fill="#5bd69a"/>
  <text x="158" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f6fbff">diffStory</text>
  <text x="265" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#a9b6c9">feat/spending-limit -> main</text>

  <rect x="64" y="118" width="288" height="580" rx="14" fill="#eef3f8"/>
  <text x="88" y="156" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#5e6b7e">STORY</text>
  <text x="88" y="186" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="23" font-weight="800" fill="#172033">Monthly spending limit</text>
  <text x="88" y="216" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#5a6576">Review the change in call-flow order.</text>

  <rect x="88" y="252" width="240" height="74" rx="10" fill="#ffffff" stroke="#d8e0ea"/>
  <circle cx="112" cy="289" r="13" fill="#2f6fed"/>
  <text x="108" y="294" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#ffffff">1</text>
  <text x="138" y="282" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1d2939">Entry point</text>
  <text x="138" y="304" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#667085">createOrder checks limit first</text>

  <rect x="88" y="340" width="240" height="74" rx="10" fill="#f8fafc" stroke="#d8e0ea"/>
  <circle cx="112" cy="377" r="13" fill="#8aa1bf"/>
  <text x="108" y="382" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#ffffff">2</text>
  <text x="138" y="370" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1d2939">Limit logic</text>
  <text x="138" y="392" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#667085">boundary condition to review</text>

  <rect x="88" y="428" width="240" height="74" rx="10" fill="#f8fafc" stroke="#d8e0ea"/>
  <circle cx="112" cy="465" r="13" fill="#8aa1bf"/>
  <text x="108" y="470" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#ffffff">3</text>
  <text x="138" y="458" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1d2939">Record spend</text>
  <text x="138" y="480" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#667085">next request sees new total</text>

  <rect x="382" y="118" width="558" height="580" rx="14" fill="#0e1521"/>
  <rect x="382" y="118" width="558" height="46" rx="14" fill="#162234"/>
  <text x="406" y="148" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#dce7f5">src/limits.ts</text>
  <text x="818" y="148" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#8ea0b8">split diff</text>

  <g font-family="SFMono-Regular, Consolas, monospace" font-size="15">
    <text x="410" y="204" fill="#738198">1</text>
    <text x="450" y="204" fill="#d8e2ef">import { getCustomer } from './db.js';</text>
    <text x="410" y="244" fill="#738198">3</text>
    <text x="450" y="244" fill="#d8e2ef">const MONTHLY_CAP = 1000;</text>
    <text x="410" y="284" fill="#738198">6</text>
    <text x="450" y="284" fill="#d8e2ef">export async function checkSpendingLimit(customerId, amount) {</text>
    <text x="410" y="324" fill="#738198">7</text>
    <text x="450" y="324" fill="#d8e2ef">  const customer = await getCustomer(customerId);</text>
    <text x="410" y="364" fill="#738198">8</text>
    <text x="450" y="364" fill="#d8e2ef">  const spent = customer.monthlySpend || 0;</text>
    <rect x="400" y="386" width="510" height="34" rx="7" fill="#173d2b"/>
    <text x="410" y="408" fill="#7fdca4">9</text>
    <text x="450" y="408" fill="#d5ffe4">+ const remaining = MONTHLY_CAP - spent;</text>
    <rect x="400" y="426" width="510" height="34" rx="7" fill="#40301f"/>
    <text x="402" y="448" fill="#ffc56d">10</text>
    <text x="450" y="448" fill="#ffe5bd">+ return { ok: amount &lt; remaining, remaining };</text>
    <text x="402" y="488" fill="#738198">11</text>
    <text x="450" y="488" fill="#d8e2ef">}</text>
  </g>

  <rect x="970" y="118" width="242" height="580" rx="14" fill="#ffffff"/>
  <text x="994" y="156" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#667085">COMMENTS</text>
  <rect x="994" y="186" width="194" height="152" rx="12" fill="#fff8e8" stroke="#f6d88d"/>
  <text x="1016" y="218" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#2d2a24">Boundary bug?</text>
  <text x="1016" y="246" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#5f574c">Should exact remaining</text>
  <text x="1016" y="266" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#5f574c">budget pass with &lt;= ?</text>
  <rect x="1016" y="292" width="86" height="28" rx="14" fill="#2f6fed"/>
  <text x="1036" y="311" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Ask agent</text>

  <rect x="994" y="366" width="194" height="120" rx="12" fill="#f5f8fb" stroke="#d8e0ea"/>
  <text x="1016" y="398" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#1f2937">Selected text</text>
  <text x="1016" y="426" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#667085">Right-click any exact</text>
  <text x="1016" y="446" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#667085">line or snippet.</text>

  <rect x="994" y="528" width="194" height="42" rx="21" fill="#e9f1ff"/>
  <text x="1024" y="555" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#2357b8">Send all open</text>
</svg>
