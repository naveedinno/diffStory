<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>diffStory</title>
    <style>
      :root { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; color: #eef4ff; background: #0c1421; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 50% 42%, rgba(0, 122, 255, .18), transparent 34%), #0c1421; }
      main { width: min(440px, calc(100vw - 48px)); text-align: center; transform: translateY(-18px); }
      .mark { width: 48px; height: 48px; margin: 0 auto 22px; border-radius: 14px; background: #007aff; box-shadow: 0 14px 38px rgba(0, 92, 230, .32); display: grid; place-items: center; }
      .mark svg { width: 30px; height: 30px; }
      h1 { margin: 0; font-size: 25px; font-weight: 680; letter-spacing: -.025em; }
      #status { margin: 12px 0 0; color: #a7b4c6; font-size: 14px; line-height: 1.45; }
      .context { margin: 18px 0 0; color: #69798f; font-size: 11px; letter-spacing: .01em; }
      .loader { width: 24px; height: 24px; margin: 26px auto 0; border: 2px solid rgba(255,255,255,.13); border-top-color: #62aaff; border-radius: 50%; animation: spin .75s linear infinite; }
      .actions { display: none; justify-content: center; gap: 8px; margin-top: 24px; }
      button { border: 1px solid rgba(255,255,255,.12); border-radius: 8px; padding: 7px 13px; color: #eef4ff; background: rgba(255,255,255,.08); font: inherit; cursor: pointer; }
      button.primary { border-color: transparent; background: #007aff; }
      button:focus-visible { outline: 3px solid rgba(0,122,255,.45); outline-offset: 2px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .loader { animation-duration: 1.5s; } }
      @media (prefers-color-scheme: light) {
        :root { color: #172033; background: #f4f8fd; }
        body { background: radial-gradient(circle at 50% 42%, rgba(0,122,255,.11), transparent 34%), #f4f8fd; }
        #status { color: #637087; } .context { color: #8b95a5; }
        .loader { border-color: rgba(0,0,0,.1); border-top-color: #007aff; }
        button { color: #172033; background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.08); }
        button.primary { color: white; background: #007aff; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 4h9.2a3 3 0 0 1 0 6H7.1a3.1 3.1 0 0 0 0 6.2H15" stroke="white" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="4" r="2.1" fill="white"/><circle cx="13.2" cy="10" r="2.1" fill="#d6e9ff"/><circle cx="15" cy="16.2" r="2.1" fill="white"/></svg>
      </div>
      <h1 id="title">Opening diffStory</h1>
      <p id="status" role="status" aria-live="polite">Preparing your local review workspace…</p>
      <div class="loader" id="loader" aria-label="Loading"></div>
      <div class="actions" id="actions">
        <button class="primary" onclick="window.__TAURI__.core.invoke('retry_startup')">Try Again</button>
        <button onclick="window.__TAURI__.core.invoke('show_log')">Show Log</button>
      </div>
      <p class="context">Local code review workspace</p>
    </main>
    <script>
      window.setStatus = (title, detail) => {
        document.getElementById('title').textContent = title;
        document.getElementById('status').textContent = detail;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('actions').style.display = 'none';
      };
      window.showStartupError = (title, detail) => {
        document.getElementById('title').textContent = title;
        document.getElementById('status').textContent = detail;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('actions').style.display = 'flex';
      };
    </script>
  </body>
</html>
