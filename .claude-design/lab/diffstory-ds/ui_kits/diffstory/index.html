<!-- @dsCard group="diffStory app" viewport="1200x750" subtitle="Interactive click-through of all 6 screens" name="diffStory app" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>html,body{margin:0;height:100%}body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:13px}#root{height:100vh}button{font-family:inherit}::selection{background:var(--accent-soft)}::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px;border:3px solid transparent;background-clip:content-box}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../ds-fallback-loader.js"></script>
</head><body><div id="root"></div>
<script>
(async()=>{
  window.DSKit={};
  const NS=await loadDS('../../');
  const kit=['chrome','code-data','WorkspacePicker','ChangeScope','ReviewHistory','AllFilesDiff','read-shared','CodeWalkthrough','FeedbackPanel','SystemStates','app'];
  const srcs=await Promise.all(kit.map(f=>fetch('./'+f+'.jsx').then(r=>r.text())));
  for(const s of srcs){const js=Babel.transform(s,{presets:[['react',{runtime:'classic',pragma:'React.createElement'}]]}).code;(new Function('React','ReactDOM',js))(window.React,window.ReactDOM);}
  window.DSKit.boot(NS);
})().catch(e=>{document.getElementById('root').innerHTML='<div style="padding:40px;font-family:monospace;font-size:12px;color:var(--del)">'+String(e)+'</div>';console.error(e)});
</script></body></html>
